databases:
  - name: meshi-archive-db
    databaseName: meshi_archive_db
    user: meshi_archive_user
    plan: free

services:
  - type: web
    name: meshi-archive-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn web.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: meshi-archive-db
          property: connectionString
      - key: WEB_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: worker
    name: meshi-archive-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m bot.discord_bot"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: meshi-archive-db
          property: connectionString
      - key: DISCORD_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_USER_ID
        sync: false
