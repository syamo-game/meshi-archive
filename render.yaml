databases:
  - name: meshi-archive-db
    databaseName: meshi_archive_db
    user: meshi_archive_user
    plan: free

services:
  - type: web
    name: meshi-archive-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run web/streamlit_app.py --server.port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meshi-archive-db
          property: connectionString
      - key: WEB_PASSWORD
        sync: false
        
  - type: worker
    name: meshi-archive-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m bot.discord_bot"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meshi-archive-db
          property: connectionString
      - key: DISCORD_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_USER_ID
        sync: false
