services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Tokyo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build: .
    restart: unless-stopped
    command: uvicorn web.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      WEB_PASSWORD: ${WEB_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      HTTPS_ONLY: "true"
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
      proxy:
        aliases:
          - meshi-web  # Caddy routes to this alias

  bot:
    build: .
    restart: unless-stopped
    command: python -m bot.discord_bot
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ADMIN_USER_ID: ${ADMIN_USER_ID}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    # Private network; only db, web, bot can communicate here
  proxy:
    external: true  # Shared with gov-procurement-crawler's Caddy

volumes:
  pgdata:
